<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#1E6878">
<meta name="robots" content="noindex">
<title>CareCircle — Hiring Pipeline</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Open+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2026;
    --border: #2a2d35;
    --accent: #2A8C9E;
    --accent2: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #e8eaf0;
    --muted: #6b7280;
    --tag-new: #1e3a5f;
    --tag-new-text: #60a5fa;
    --tag-interview: #1a3a2a;
    --tag-interview-text: #34d399;
    --tag-hired: #1a2e1a;
    --tag-hired-text: #86efac;
    --tag-pass: #3a1a1a;
    --tag-pass-text: #fca5a5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Open Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Montserrat', sans-serif;
    font-size: 20px;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .logo span { color: var(--accent); }
  .header-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .header-actions { display: flex; gap: 10px; }

  /* LAYOUT */
  .layout { display: flex; height: calc(100vh - 57px); }

  /* SIDEBAR */
  .sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-top {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .search-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Open Sans', sans-serif;
    font-size: 13px;
    width: 100%;
    outline: none;
  }
  .search-box:focus { border-color: var(--accent); }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    font-family: 'Open Sans', sans-serif;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  .candidate-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .candidate-list::-webkit-scrollbar { width: 4px; }
  .candidate-list::-webkit-scrollbar-track { background: transparent; }
  .candidate-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .candidate-card {
    padding: 12px 14px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid transparent;
    margin-bottom: 4px;
    transition: all 0.15s;
  }
  .candidate-card:hover { background: var(--surface2); border-color: var(--border); }
  .candidate-card.active { background: var(--surface2); border-color: var(--accent); }
  .card-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .card-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; align-items: center; }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  .dot-new { background: var(--accent); }
  .dot-interview { background: var(--accent2); }
  .dot-hired { background: #86efac; }
  .dot-pass { background: var(--danger); }

  /* MAIN PANEL */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    background: var(--bg);
  }
  .main::-webkit-scrollbar { width: 4px; }
  .main::-webkit-scrollbar-thumb { background: var(--border); }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60%;
    color: var(--muted);
    text-align: center;
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state h3 { font-family: 'Montserrat', sans-serif; font-size: 20px; color: var(--text); opacity: 0.5; margin-bottom: 8px; }

  /* CANDIDATE DETAIL */
  .detail-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .detail-name {
    font-family: 'Montserrat', sans-serif;
    font-size: 28px;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .detail-meta { color: var(--muted); font-size: 13px; display: flex; gap: 16px; flex-wrap: wrap; }
  .detail-meta a { color: var(--accent); text-decoration: none; }
  .status-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge-new { background: var(--tag-new); color: var(--tag-new-text); }
  .badge-interview { background: var(--tag-interview); color: var(--tag-interview-text); }
  .badge-hired { background: var(--tag-hired); color: var(--tag-hired-text); }
  .badge-pass { background: var(--tag-pass); color: var(--tag-pass-text); }

  .section {
    margin-bottom: 28px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* SCREENING QUESTIONS */
  .screen-q {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .screen-q-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .screen-q-text {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .screen-answer {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    font-family: 'Open Sans', sans-serif;
    font-size: 13px;
    resize: vertical;
    min-height: 60px;
    outline: none;
    transition: border-color 0.15s;
  }
  .screen-answer:focus { border-color: var(--accent); }

  /* SCORE GRID */
  .score-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .score-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .score-label { font-size: 11px; color: var(--muted); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .score-stars { display: flex; gap: 4px; }
  .star {
    width: 22px; height: 22px;
    cursor: pointer;
    font-size: 18px;
    line-height: 22px;
    transition: transform 0.1s;
    user-select: none;
  }
  .star:hover { transform: scale(1.2); }

  /* INTERVIEW GUIDE */
  .interview-q {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .iq-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .iq-number { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
  .iq-category { font-size: 10px; color: var(--muted); background: var(--surface2); padding: 2px 8px; border-radius: 10px; }
  .iq-text { font-size: 13px; color: var(--text); margin-bottom: 4px; font-weight: 500; line-height: 1.5; }
  .iq-probe { font-size: 11px; color: var(--muted); font-style: italic; margin-bottom: 10px; line-height: 1.5; }
  .iq-notes {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    font-family: 'Open Sans', sans-serif;
    font-size: 12px;
    resize: vertical;
    min-height: 50px;
    outline: none;
  }
  .iq-notes:focus { border-color: var(--accent); }

  /* ROLE PLAY */
  .roleplay-box {
    background: var(--surface);
    border: 1px solid var(--warn);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .roleplay-box .rp-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--warn);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .roleplay-box p { font-size: 13px; color: var(--text); line-height: 1.6; }
  .roleplay-box .rp-script {
    background: var(--bg);
    border-radius: 6px;
    padding: 10px 12px;
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    font-style: italic;
  }
  .roleplay-result {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    font-family: 'Open Sans', sans-serif;
    font-size: 12px;
    resize: vertical;
    min-height: 80px;
    margin-top: 10px;
    outline: none;
  }

  /* DECISION */
  .decision-buttons { display: flex; gap: 10px; margin-top: 8px; }
  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'Open Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #237f8f; }
  .btn-success { background: var(--accent2); color: white; }
  .btn-success:hover { background: #059669; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { background: #dc2626; }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-ghost:hover { background: var(--surface2); }
  .btn-sm { padding: 6px 14px; font-size: 12px; }

  /* ONBOARDING CHECKLIST */
  .checklist-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .checklist-item:last-child { border-bottom: none; }
  .check-box {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 11px;
  }
  .check-box.checked { background: var(--accent2); border-color: var(--accent2); color: white; }
  .check-content { flex: 1; }
  .check-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .check-title.done { text-decoration: line-through; color: var(--muted); }
  .check-desc { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .check-day { font-size: 10px; font-weight: 700; color: var(--warn); text-transform: uppercase; letter-spacing: 0.5px; background: #2a1e08; padding: 2px 7px; border-radius: 10px; }

  /* NOTES */
  .notes-area {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Open Sans', sans-serif;
    font-size: 13px;
    resize: vertical;
    min-height: 100px;
    outline: none;
    line-height: 1.6;
  }
  .notes-area:focus { border-color: var(--accent); }

  /* ADD CANDIDATE MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 28px 24px;
    width: 440px;
    max-width: 95vw;
    transform: translateY(10px);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h2 { font-family: 'Montserrat', sans-serif; font-size: 22px; margin-bottom: 20px; }
  .form-row { margin-bottom: 14px; }
  .form-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Open Sans', sans-serif;
    font-size: 13px;
    outline: none;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 20px;
    padding: 12px 16px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
  }
  .stat { text-align: center; }
  .stat-num { font-size: 18px; font-weight: 700; font-family: 'Montserrat', sans-serif; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  /* TABS */
  .tabs { display: flex; gap: 2px; margin-bottom: 20px; background: var(--surface); border-radius: 10px; padding: 4px; border: 1px solid var(--border); }
  .tab {
    flex: 1;
    padding: 8px 10px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    border-radius: 7px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }
  .tab.active { background: var(--accent); color: white; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .save-indicator {
    font-size: 11px;
    color: var(--accent2);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .save-indicator.show { opacity: 1; }

  .flag-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .flag {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
  }
  .flag-red { background: var(--tag-pass); color: var(--tag-pass-text); border-color: #3a1a1a; }
  .flag-red.active { border-color: var(--danger); }
  .flag-green { background: var(--tag-interview); color: var(--tag-interview-text); border-color: #1a3a2a; }
  .flag-green.active { border-color: var(--accent2); }

  .overall-score-display {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 14px;
  }
  .big-score { font-family: 'Montserrat', sans-serif; font-size: 36px; line-height: 1; }
  .score-breakdown { font-size: 11px; color: var(--muted); line-height: 1.8; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">Care<span>Circle</span> <span style="font-family:'Open Sans',sans-serif;font-size:14px;font-weight:300;color:var(--muted)">/ Hiring Pipeline</span></div>
    <div class="header-sub">Sales Rep Recruitment — Northwest Florida</div>
  </div>
  <div class="header-actions">
    <span class="save-indicator" id="saveIndicator">✓ Saved</span>
    <button class="btn btn-primary btn-sm" onclick="openModal()">+ Add Candidate</button>
  </div>
</div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-top">
      <input class="search-box" type="text" placeholder="Search candidates..." oninput="filterCandidates(this.value)" />
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('new', this)">New</button>
        <button class="filter-btn" onclick="setFilter('interview', this)">Interview</button>
        <button class="filter-btn" onclick="setFilter('hired', this)">Hired</button>
        <button class="filter-btn" onclick="setFilter('pass', this)">Pass</button>
      </div>
    </div>
    <div class="candidate-list" id="candidateList"></div>
    <div class="stats-bar" id="statsBar"></div>
  </div>

  <!-- MAIN -->
  <div class="main" id="mainPanel">
    <div class="empty-state">
      <div class="empty-icon">📋</div>
      <h3>No candidate selected</h3>
      <p>Add a candidate from your ads responses, or select one from the list.</p>
    </div>
  </div>

</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>Add Candidate</h2>
    <div class="form-row-2">
      <div class="form-row">
        <label class="form-label">First Name</label>
        <input class="form-input" id="addFirst" placeholder="John" />
      </div>
      <div class="form-row">
        <label class="form-label">Last Name</label>
        <input class="form-input" id="addLast" placeholder="Smith" />
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Phone</label>
      <input class="form-input" id="addPhone" placeholder="850-555-0000" />
    </div>
    <div class="form-row">
      <label class="form-label">Email</label>
      <input class="form-input" id="addEmail" placeholder="john@email.com" />
    </div>
    <div class="form-row">
      <label class="form-label">Source (where they responded)</label>
      <input class="form-input" id="addSource" placeholder="e.g. Facebook, Indeed, Text" />
    </div>
    <div class="form-row">
      <label class="form-label">Their message / what they said</label>
      <textarea class="form-input" id="addNote" rows="3" placeholder="Paste their initial text or note..."></textarea>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-primary" onclick="addCandidate()">Add Candidate</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
let candidates = JSON.parse(localStorage.getItem('cc_candidates') || '[]');
let activeId = null;
let currentFilter = 'all';
let searchTerm = '';

function save() {
  localStorage.setItem('cc_candidates', JSON.stringify(candidates));
  const ind = document.getElementById('saveIndicator');
  ind.classList.add('show');
  setTimeout(() => ind.classList.remove('show'), 1500);
}

function getById(id) { return candidates.find(c => c.id === id); }

// ── SCREENING QUESTIONS ────────────────────────────────────────────────────
const screeningQuestions = [
  { id: 'sq1', label: 'Red Flag Check', text: 'Are you looking for a base salary, or are you comfortable with 100% commission?' , probe: 'Listen for: "I need something guaranteed" = Red flag. "I\'m comfortable with commission if the product is real" = Good sign.' },
  { id: 'sq2', label: 'Transportation', text: 'Do you have reliable transportation to visit agencies around the Pensacola area in person?', probe: 'Hard requirement. No car = no field sales.' },
  { id: 'sq3', label: 'Sales Background', text: 'Tell me about your sales background — what have you sold, and what was your best month?', probe: 'Not a dealbreaker to be new, but you want someone who\'s made cold calls before or sold something door-to-door. Comfort with rejection is key.' },
  { id: 'sq4', label: 'Local Knowledge', text: 'Are you familiar with the senior care industry at all — home care agencies, assisted living, hospice?', probe: 'Nice to have, not required. Family experience caring for a senior = genuine empathy. Prior healthcare sales = jackpot.' },
  { id: 'sq5', label: 'Availability', text: 'What\'s your current situation — are you working somewhere else, or is this your primary focus?', probe: 'You want someone hungry. Full-time elsewhere with "side hustle" energy is fine. Fully unemployed and desperate = could go either way. Assess motivation.' },
  { id: 'sq6', label: 'Self-Motivation', text: 'If I hand you a sales playbook on Monday and say "go sign up 5 agencies this week" — what does your first day look like?', probe: 'You\'re testing if they have a process. "I\'d study the playbook, pull a list, make calls" = organized. Blank stare = wrong fit.' },
];

// ── INTERVIEW QUESTIONS ────────────────────────────────────────────────────
const interviewQuestions = [
  { id: 'iq1', category: 'Motivation', text: 'Why does this specific opportunity appeal to you?', probe: 'Probe: "What is it about senior care or this product that interests you beyond just the money?" Look for: genuine resonance with the mission, not just "I need income."' },
  { id: 'iq2', category: 'Sales Skills', text: 'Tell me about a time you had to sell something to someone who was skeptical. What did you do?', probe: 'Probe: "Walk me through exactly what you said." Look for: listening, reframing objections, persistence without pressure.' },
  { id: 'iq3', category: 'Rejection Tolerance', text: 'When you\'ve been told no on a sales call — not "I\'ll think about it," an actual no — what do you do next?', probe: 'Look for: notes the rejection, moves on quickly, doesn\'t internalize it. Red flag: "I don\'t really get nos" (no experience) or "I try to keep pushing" (will alienate people).' },
  { id: 'iq4', category: 'Organization', text: 'How do you currently keep track of follow-ups, calls you need to make, and deals in progress?', probe: 'Look for: any system at all. Spreadsheet, notes app, CRM — anything shows discipline. "I just remember" = concern for volume work.' },
  { id: 'iq5', category: 'Learning Speed', text: 'This is a niche product in a niche industry. How do you get up to speed on something new quickly?', probe: 'Look for: they describe a real process (reading, asking questions, role-playing, etc.). Avoid: "I\'ll just figure it out as I go."' },
  { id: 'iq6', category: 'Honesty', text: 'If a prospect asks you a question you don\'t know the answer to during a call — what do you say?', probe: 'Right answer: "I\'d be honest that I don\'t know and get them the answer." Wrong answer: they\'d make something up or deflect. Honesty is non-negotiable for CareCircle\'s brand.' },
  { id: 'iq7', category: 'Expectations', text: 'The first month is going to be a lot of nos. How do you stay motivated when the pipeline is thin at the start?', probe: 'Look for: realistic expectations, internal motivation, routine-oriented. Concern: "Oh I\'m fine with that" with no specifics = they haven\'t really thought about it.' },
];

// ── ONBOARDING CHECKLIST ───────────────────────────────────────────────────
const onboardingItems = [
  { day: 'Day 1', title: 'Send 1099 contractor agreement', desc: 'Email the contract. Get it signed before any work begins.' },
  { day: 'Day 1', title: 'Share Sales Operations Manual', desc: 'Send the full PDF. Ask them to read sections 1–4 before tomorrow.' },
  { day: 'Day 1', title: 'Walk through carecircle.fit/research together', desc: 'Screen share. Run a search for 3 different providers. Show them what the scanner looks like from a prospect\'s eyes.' },
  { day: 'Day 1', title: 'Set up call logging (Google Sheet or CLAW)', desc: 'They need to log every call: agency name, contact, outcome, follow-up date. Show them the format.' },
  { day: 'Day 2', title: 'Read & quiz on Sales Manual sections 1–4', desc: 'Ask them: What\'s the 60-day guarantee? What does A Place for Mom charge? What are the two pricing tiers?' },
  { day: 'Day 2', title: 'Run the pitch on Chase (role-play)', desc: 'Chase plays a skeptical ALF marketing director. Rep runs the full call. Debrief after. Repeat once more.' },
  { day: 'Day 2', title: 'Pull their first hit list', desc: 'Go to providers.json together. Identify 15–20 high-score agencies to call first. Rep writes their hit list down.' },
  { day: 'Day 3', title: 'Shadow Chase on 2 real calls', desc: 'Rep listens. No talking. Just absorbs. Debrief each call right after.' },
  { day: 'Day 3', title: 'Rep makes first 5 solo calls with Chase listening', desc: 'Chase gives feedback after each one. Don\'t interrupt during the call.' },
  { day: 'Day 5', title: 'First activity report due', desc: 'Calls made, outcomes, follow-ups booked. Review together.' },
  { day: 'Week 2', title: 'Rep makes 20+ calls independently', desc: 'Daily activity check-in via text. You\'re available but not listening in.' },
  { day: 'Week 2', title: 'First deal debrief (whether won or lost)', desc: 'Walk through what happened, what they\'d do differently, what worked.' },
  { day: '30 Days', title: '30-day performance review', desc: 'Calls made, demos given, deals closed. Is the rep on track? Adjust territory or approach if needed.' },
];

// ── RENDER ────────────────────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('candidateList');
  let filtered = candidates;
  if (currentFilter !== 'all') filtered = filtered.filter(c => c.status === currentFilter);
  if (searchTerm) filtered = filtered.filter(c =>
    (c.name||'').toLowerCase().includes(searchTerm) ||
    (c.phone||'').includes(searchTerm)
  );

  if (filtered.length === 0) {
    list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">No candidates yet</div>`;
  } else {
    list.innerHTML = filtered.map(c => `
      <div class="candidate-card ${c.id === activeId ? 'active' : ''}" onclick="selectCandidate('${c.id}')">
        <div class="card-name">${c.name}</div>
        <div class="card-meta">
          <span class="status-dot dot-${c.status}"></span>
          <span>${c.status.charAt(0).toUpperCase() + c.status.slice(1)}</span>
          <span>·</span>
          <span>${c.source || 'Unknown'}</span>
          <span>·</span>
          <span>${c.date}</span>
        </div>
      </div>
    `).join('');
  }

  // stats
  const stats = document.getElementById('statsBar');
  const counts = { new: 0, interview: 0, hired: 0, pass: 0 };
  candidates.forEach(c => counts[c.status] = (counts[c.status]||0) + 1);
  stats.innerHTML = Object.entries(counts).map(([k,v]) => `
    <div class="stat">
      <div class="stat-num" style="color:${k==='new'?'var(--accent)':k==='interview'?'var(--accent2)':k==='hired'?'#86efac':'var(--danger)'}">${v}</div>
      <div class="stat-label">${k}</div>
    </div>
  `).join('');
}

function selectCandidate(id) {
  activeId = id;
  renderList();
  renderDetail();
}

function renderDetail() {
  const c = getById(activeId);
  if (!c) return;
  if (!c.scores) c.scores = {};
  if (!c.screenAnswers) c.screenAnswers = {};
  if (!c.interviewNotes) c.interviewNotes = {};
  if (!c.roleplayNotes) c.roleplayNotes = '';
  if (!c.onboarding) c.onboarding = {};
  if (!c.flags) c.flags = [];

  const main = document.getElementById('mainPanel');

  // compute overall interview score
  const scoreKeys = ['phone_presence','motivation','sales_instinct','coachability','local_knowledge'];
  const scoreLabels = { phone_presence: 'Phone Presence', motivation: 'Motivation', sales_instinct: 'Sales Instinct', coachability: 'Coachability', local_knowledge: 'Local Knowledge' };
  const scored = scoreKeys.filter(k => c.scores[k]);
  const avg = scored.length ? (scored.reduce((a,k) => a + c.scores[k], 0) / scored.length).toFixed(1) : '—';

  main.innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-name">${c.name}</div>
        <div class="detail-meta">
          ${c.phone ? `<span>📞 <a href="tel:${c.phone}">${c.phone}</a></span>` : ''}
          ${c.email ? `<span>✉️ <a href="mailto:${c.email}">${c.email}</a></span>` : ''}
          <span>📥 ${c.source || 'Unknown source'}</span>
          <span>📅 Added ${c.date}</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <select onchange="updateStatus('${c.id}', this.value)" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-family:'Open Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;outline:none;">
          <option value="new" ${c.status==='new'?'selected':''}>New</option>
          <option value="interview" ${c.status==='interview'?'selected':''}>Interview</option>
          <option value="hired" ${c.status==='hired'?'selected':''}>Hired</option>
          <option value="pass" ${c.status==='pass'?'selected':''}>Pass</option>
        </select>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab(0, this)">Screen</div>
      <div class="tab" onclick="switchTab(1, this)">Interview</div>
      <div class="tab" onclick="switchTab(2, this)">Decision</div>
      <div class="tab" onclick="switchTab(3, this)">Onboard</div>
    </div>

    <!-- TAB 0: SCREENING -->
    <div class="tab-content active" id="tab0">
      <div class="section">
        <div class="section-title">Initial Message / Notes</div>
        <textarea class="notes-area" placeholder="Their initial text, what they said, first impression..." oninput="updateField('${c.id}', 'initialNote', this.value)">${c.initialNote||''}</textarea>
      </div>

      <div class="section">
        <div class="section-title">Screening Call Questions — Ask These Before Scheduling an Interview</div>
        ${screeningQuestions.map(q => `
          <div class="screen-q">
            <div class="screen-q-label">${q.label}</div>
            <div class="screen-q-text">${q.text}</div>
            <div style="font-size:11px;color:var(--muted);font-style:italic;margin-bottom:8px;line-height:1.5;">${q.probe}</div>
            <textarea class="screen-answer" placeholder="Their answer..." oninput="updateNested('${c.id}', 'screenAnswers', '${q.id}', this.value)">${c.screenAnswers[q.id]||''}</textarea>
          </div>
        `).join('')}
      </div>

      <div class="section">
        <div class="section-title">Red Flags Spotted</div>
        <div class="flag-row">
          ${['Wants base salary','No car','Won\'t make cold calls','Flaky communicator','No local knowledge','Seemed dishonest','Unrealistic expectations'].map(f => `
            <div class="flag flag-red ${(c.flags||[]).includes(f)?'active':''}" onclick="toggleFlag('${c.id}', '${f}')">${f}</div>
          `).join('')}
        </div>
        <div class="section-title" style="margin-top:14px;">Green Flags</div>
        <div class="flag-row">
          ${['Commission-motivated','Has car + reliable','Prior B2B sales','Healthcare background','Local connections','Hungry / unemployed','Strong phone voice'].map(f => `
            <div class="flag flag-green ${(c.flags||[]).includes(f)?'active':''}" onclick="toggleFlag('${c.id}', '${f}')">${f}</div>
          `).join('')}
        </div>
      </div>

      <div class="section">
        <div class="section-title">Screening Outcome</div>
        <div style="display:flex;gap:10px;">
          <button class="btn btn-success btn-sm" onclick="updateStatus('${c.id}','interview')">✓ Advance to Interview</button>
          <button class="btn btn-danger btn-sm" onclick="updateStatus('${c.id}','pass')">✗ Pass</button>
        </div>
      </div>
    </div>

    <!-- TAB 1: INTERVIEW -->
    <div class="tab-content" id="tab1">
      <div class="section">
        <div class="section-title">Interview Scoring</div>
        <div class="score-grid">
          ${scoreKeys.map(k => `
            <div class="score-item">
              <div class="score-label">${scoreLabels[k]}</div>
              <div class="score-stars">
                ${[1,2,3,4,5].map(n => `<span class="star" onclick="setScore('${c.id}','${k}',${n})">${(c.scores[k]||0)>=n?'★':'☆'}</span>`).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="section">
        <div class="section-title">Interview Questions</div>
        ${interviewQuestions.map((q,i) => `
          <div class="interview-q">
            <div class="iq-header">
              <div class="iq-number">Q${i+1}</div>
              <div class="iq-category">${q.category}</div>
            </div>
            <div class="iq-text">${q.text}</div>
            <div class="iq-probe">${q.probe}</div>
            <textarea class="iq-notes" placeholder="Notes on their answer..." oninput="updateNested('${c.id}', 'interviewNotes', '${q.id}', this.value)">${c.interviewNotes[q.id]||''}</textarea>
          </div>
        `).join('')}
      </div>

      <div class="section">
        <div class="section-title">Role-Play Exercise</div>
        <div class="roleplay-box">
          <div class="rp-title">⚡ Live Role-Play — Required Before Hiring</div>
          <p>Tell them: <em>"I'm going to be a skeptical ALF marketing director. You've just gotten me on the phone. You don't know my score. Pretend you've looked it up and it's a 6.8. Ready? Go."</em></p>
          <div class="rp-script">
            You play: "I'm really not looking to add another marketing partnership right now. We already work with A Place for Mom and we're happy."<br><br>
            Listen for: Do they panic? Do they go straight to price? Do they ask a question first? The best reps will say something like: "I understand — can I ask how much you're paying them per placement?" That pivot shows instinct.
          </div>
          <textarea class="roleplay-result" placeholder="How'd they do? Notes on their performance..." oninput="updateField('${c.id}', 'roleplayNotes', this.value)">${c.roleplayNotes||''}</textarea>
        </div>
      </div>
    </div>

    <!-- TAB 2: DECISION -->
    <div class="tab-content" id="tab2">
      <div class="section">
        <div class="section-title">Overall Score</div>
        <div class="overall-score-display">
          <div class="big-score" style="color:${avg>=4?'var(--accent2)':avg>=3?'var(--warn)':'var(--danger)'}">${avg}</div>
          <div class="score-breakdown">
            ${scoreKeys.map(k => `${scoreLabels[k]}: ${c.scores[k]?'★'.repeat(c.scores[k])+'☆'.repeat(5-c.scores[k]):'Not scored'}`).join('<br>')}
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Flags Summary</div>
        <div class="flag-row">
          ${(c.flags||[]).length ? c.flags.map(f => `
            <div class="flag ${['Wants base salary','No car','Won\'t make cold calls','Flaky communicator','No local knowledge','Seemed dishonest','Unrealistic expectations'].includes(f)?'flag-red':'flag-green'} active">${f}</div>
          `).join('') : '<span style="color:var(--muted);font-size:13px;">No flags recorded</span>'}
        </div>
      </div>

      <div class="section">
        <div class="section-title">Final Notes</div>
        <textarea class="notes-area" placeholder="Your overall read on this person. Gut feeling. Anything that stood out..." oninput="updateField('${c.id}', 'finalNotes', this.value)">${c.finalNotes||''}</textarea>
      </div>

      <div class="section">
        <div class="section-title">What Comes Next (if hiring)</div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:13px;line-height:1.8;color:var(--text);">
          <strong style="color:var(--accent2);">Before first day:</strong> Send 1099 contractor agreement. Get it signed. No exceptions.<br>
          <strong style="color:var(--accent2);">Day 1:</strong> Share Sales Operations Manual + platform walkthrough.<br>
          <strong style="color:var(--accent2);">Day 2:</strong> Quiz them on the manual. Role-play the pitch again. Build their hit list.<br>
          <strong style="color:var(--accent2);">Day 3:</strong> Shadow calls, then they make 5 calls with Chase listening.<br>
          <strong style="color:var(--accent2);">Week 2:</strong> Independent calling. Daily text check-in.<br>
          <strong style="color:var(--accent2);">Day 30:</strong> Performance review. At least 1 deal closed = on track.
        </div>
      </div>

      <div class="decision-buttons">
        <button class="btn btn-success" onclick="updateStatus('${c.id}','hired');switchTabById(3)">✓ Hire — Start Onboarding</button>
        <button class="btn btn-danger" onclick="updateStatus('${c.id}','pass')">✗ Pass on This Candidate</button>
        <button class="btn btn-ghost btn-sm" onclick="deleteCandidate('${c.id}')">Delete</button>
      </div>
    </div>

    <!-- TAB 3: ONBOARDING -->
    <div class="tab-content" id="tab3">
      <div class="section">
        <div class="section-title">Onboarding Checklist — ${c.name.split(' ')[0]}</div>
        ${onboardingItems.map((item, i) => `
          <div class="checklist-item">
            <div class="check-box ${c.onboarding[i]?'checked':''}" onclick="toggleOnboarding('${c.id}', ${i})">${c.onboarding[i]?'✓':''}</div>
            <div class="check-content">
              <div class="check-title ${c.onboarding[i]?'done':''}">${item.title} <span class="check-day">${item.day}</span></div>
              <div class="check-desc">${item.desc}</div>
            </div>
          </div>
        `).join('')}
      </div>

      <div class="section">
        <div class="section-title">Onboarding Notes</div>
        <textarea class="notes-area" placeholder="Anything specific to this rep's training — things they struggled with, areas to reinforce..." oninput="updateField('${c.id}', 'onboardingNotes', this.value)">${c.onboardingNotes||''}</textarea>
      </div>
    </div>
  `;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
function switchTab(n, el) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', i===n);
  });
  document.querySelectorAll('.tab-content').forEach((t,i) => {
    t.classList.toggle('active', i===n);
  });
}

function switchTabById(n) {
  const tabs = document.querySelectorAll('.tab');
  const contents = document.querySelectorAll('.tab-content');
  tabs.forEach((t,i) => t.classList.toggle('active', i===n));
  contents.forEach((t,i) => t.classList.toggle('active', i===n));
}

function updateStatus(id, status) {
  const c = getById(id);
  if (c) { c.status = status; save(); renderList(); renderDetail(); }
}

function updateField(id, key, val) {
  const c = getById(id);
  if (c) { c[key] = val; save(); }
}

function updateNested(id, key, subkey, val) {
  const c = getById(id);
  if (c) { if(!c[key]) c[key]={}; c[key][subkey] = val; save(); }
}

function setScore(id, key, val) {
  const c = getById(id);
  if (c) { if(!c.scores) c.scores={}; c.scores[key] = val; save(); renderDetail(); }
}

function toggleFlag(id, flag) {
  const c = getById(id);
  if (!c) return;
  if (!c.flags) c.flags = [];
  const idx = c.flags.indexOf(flag);
  if (idx >= 0) c.flags.splice(idx, 1);
  else c.flags.push(flag);
  save();
  renderDetail();
  // stay on same tab
  const activetab = document.querySelector('.tab.active');
  if (activetab) {
    const idx2 = Array.from(document.querySelectorAll('.tab')).indexOf(activetab);
    switchTabById(idx2);
  }
}

function toggleOnboarding(id, i) {
  const c = getById(id);
  if (!c) return;
  if (!c.onboarding) c.onboarding = {};
  c.onboarding[i] = !c.onboarding[i];
  save();
  renderDetail();
  switchTabById(3);
}

function deleteCandidate(id) {
  if (!confirm('Delete this candidate?')) return;
  candidates = candidates.filter(c => c.id !== id);
  activeId = null;
  save();
  renderList();
  document.getElementById('mainPanel').innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><h3>No candidate selected</h3><p>Select a candidate from the list.</p></div>`;
}

function filterCandidates(val) {
  searchTerm = val.toLowerCase();
  renderList();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('addModal').classList.add('open');
  document.getElementById('addFirst').focus();
}
function closeModal() {
  document.getElementById('addModal').classList.remove('open');
}

function addCandidate() {
  const first = document.getElementById('addFirst').value.trim();
  const last = document.getElementById('addLast').value.trim();
  if (!first) { alert('First name required'); return; }

  const c = {
    id: Date.now().toString(),
    name: [first, last].filter(Boolean).join(' '),
    phone: document.getElementById('addPhone').value.trim(),
    email: document.getElementById('addEmail').value.trim(),
    source: document.getElementById('addSource').value.trim(),
    initialNote: document.getElementById('addNote').value.trim(),
    status: 'new',
    date: new Date().toLocaleDateString('en-US', { month:'short', day:'numeric' }),
    scores: {},
    screenAnswers: {},
    interviewNotes: {},
    roleplayNotes: '',
    onboarding: {},
    flags: [],
  };

  candidates.unshift(c);
  save();
  closeModal();
  // clear fields
  ['addFirst','addLast','addPhone','addEmail','addSource','addNote'].forEach(id => document.getElementById(id).value='');
  selectCandidate(c.id);
}

// enter key in modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── INIT ──────────────────────────────────────────────────────────────────
renderList();
</script>
</body>
</html>
